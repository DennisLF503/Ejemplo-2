<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulario de Registro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h1>Registro de Usuario</h1>
    <p class="subtitle">Completa todos los campos para continuar</p>

    <form id="registroForm" novalidate>

      <div class="campo">
        <label for="nombre">Nombre completo</label>
        <input type="text" id="nombre" placeholder="Ej: Juan Pérez" />
        <span class="error" id="errorNombre"></span>
      </div>

      <div class="campo">
        <label for="correo">Correo electrónico</label>
        <input type="email" id="correo" placeholder="Ej: juan@correo.com" />
        <span class="error" id="errorCorreo"></span>
      </div>

      <div class="campo">
        <label for="telefono">Teléfono</label>
        <input type="tel" id="telefono" placeholder="Ej: 7777-8888" />
        <span class="error" id="errorTelefono"></span>
      </div>

      <div class="campo">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
        <span class="error" id="errorPassword"></span>
      </div>

      <button type="submit" id="btnRegistrar">Registrarse</button>

    </form>

    <div class="confirmacion" id="confirmacion"></div>

    <div class="lista-usuarios" id="listaUsuarios"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
